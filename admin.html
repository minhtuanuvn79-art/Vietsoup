<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART POS - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        // URL API Google Sheet chung
        const API_URL = 'https://script.google.com/macros/s/AKfycbwhk9e4ANbbq9Pu0sJ3JYqGG3kkSBVzMz4zTgECsXGxEDIpGsTLGa4P3pcPs_dUHKi-0Q/exec';

        const Icon = ({ name, size = 16, ...props }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} {...props}></i>;
        };

        const USERS_KEY = 'SMART_POS_USERS';
        const STORAGE_KEY = 'SMART_POS_DATA_V5'; // Key dữ liệu POS để đồng bộ

        const AppAdmin = () => {
            const [users, setUsers] = useState(() => {
                const saved = localStorage.getItem(USERS_KEY);
                return saved ? JSON.parse(saved) : [];
            });

            const [showAddModal, setShowAddModal] = useState(false);
            const [editingUser, setEditingUser] = useState(null);
            const [isSyncing, setIsSyncing] = useState(false);

            // --- HÀM ĐỒNG BỘ GOOGLE SHEET ---
            const syncToCloud = async (currentUsers) => {
                setIsSyncing(true);
                try {
                    // Lấy dữ liệu POS hiện tại từ local để không làm mất khi đồng bộ
                    const posData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                    
                    await fetch(API_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'syncAll',
                            users: currentUsers,
                            posData: posData,
                            timestamp: new Date().toISOString()
                        })
                    });
                    console.log("Đã đồng bộ User lên Cloud");
                } catch (e) {
                    console.error("Lỗi đồng bộ:", e);
                } finally {
                    setTimeout(() => setIsSyncing(false), 1000);
                }
            };

            const loadFromCloud = async () => {
                try {
                    const response = await fetch(`${API_URL}?action=getData`);
                    const cloudData = await response.json();
                    if (cloudData && cloudData.users) {
                        setUsers(cloudData.users);
                        localStorage.setItem(USERS_KEY, JSON.stringify(cloudData.users));
                    }
                } catch (e) {
                    console.error("Lỗi tải dữ liệu từ Cloud:", e);
                }
            };

            // Tải dữ liệu khi mở trang
            useEffect(() => {
                loadFromCloud();
            }, []);

            // Lưu Local và Cloud mỗi khi có thay đổi danh sách User
            useEffect(() => {
                localStorage.setItem(USERS_KEY, JSON.stringify(users));
                if (users.length > 0) {
                    syncToCloud(users);
                }
            }, [users]);

            const addUser = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const newUser = {
                    id: Date.now(),
                    name: fd.get('name'),
                    username: fd.get('username'),
                    password: fd.get('password'),
                    role: fd.get('role'),
                    permissions: fd.getAll('perms')
                };
                setUsers([...users, newUser]);
                setShowAddModal(false);
            };

            const deleteUser = (id) => {
                if (confirm('Xác nhận xóa tài khoản này?')) {
                    setUsers(users.filter(u => u.id !== id));
                }
            };

            const saveEditedUser = () => {
                setUsers(users.map(u => u.id === editingUser.id ? editingUser : u));
                setEditingUser(null);
            };

            return (
                <div className="flex h-screen bg-[#F8FAFC]">
                    {/* Sidebar */}
                    <aside className="w-64 bg-[#0F172A] text-white flex flex-col shrink-0">
                        <div className="p-6 border-b border-white/5 flex items-center gap-3">
                            <div className="bg-emerald-500 p-2 rounded-xl"><Icon name="shield-check" fill="white" /></div>
                            <span className="font-black text-lg tracking-tighter uppercase italic text-emerald-400">Admin Panel</span>
                        </div>
                        <nav className="flex-1 p-4 space-y-2">
                            <SidebarItem icon="users" label="Quản lý nhân viên" active={true} />
                            <SidebarItem icon="arrow-left" label="Quay lại POS" onClick={() => window.location.href='appvs.html'} />
                        </nav>
                        <div className="p-6 text-[10px] text-slate-500 font-bold uppercase tracking-widest">
                            {isSyncing ? ' đang đồng bộ...' : ' Hệ thống đã đồng bộ'}
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-10 overflow-y-auto">
                        <div className="flex justify-between items-center mb-10">
                            <div>
                                <h1 className="text-3xl font-black text-slate-800 uppercase italic">Tài khoản hệ thống</h1>
                                <p className="text-slate-400 font-medium">Quản lý quyền truy cập của nhân viên</p>
                            </div>
                            <button 
                                onClick={() => setShowAddModal(true)}
                                className="bg-slate-900 text-white px-8 py-4 rounded-3xl font-black text-xs uppercase shadow-xl flex items-center gap-3 hover:bg-emerald-600 transition-all"
                            >
                                <Icon name="user-plus" /> Thêm tài khoản
                            </button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {users.map(user => (
                                <div key={user.id} className="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm group hover:shadow-xl transition-all">
                                    <div className="flex justify-between items-start mb-6">
                                        <div className={`w-14 h-14 rounded-2xl flex items-center justify-center text-2xl ${user.role === 'admin' ? 'bg-rose-50 text-rose-500' : 'bg-emerald-50 text-emerald-500'}`}>
                                            <Icon name={user.role === 'admin' ? "shield" : "user"} size={28} />
                                        </div>
                                        <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <button onClick={() => setEditingUser({...user})} className="p-3 bg-slate-50 rounded-xl text-slate-400 hover:text-blue-500"><Icon name="edit-3" /></button>
                                            <button onClick={() => deleteUser(user.id)} className="p-3 bg-red-50 rounded-xl text-red-300 hover:text-red-500"><Icon name="trash-2" /></button>
                                        </div>
                                    </div>
                                    
                                    <h3 className="font-black text-slate-800 text-xl mb-1">{user.name}</h3>
                                    <p className="text-slate-400 font-bold text-xs uppercase mb-4 tracking-wider">@{user.username}</p>
                                    
                                    <div className="flex flex-wrap gap-2 mb-6">
                                        <span className={`px-3 py-1 rounded-lg text-[9px] font-black uppercase ${user.role === 'admin' ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-600'}`}>
                                            {user.role}
                                        </span>
                                        {user.permissions?.map(p => (
                                            <span key={p} className="px-3 py-1 bg-slate-100 text-slate-500 rounded-lg text-[9px] font-black uppercase">{p}</span>
                                        ))}
                                    </div>

                                    <div className="pt-6 border-t border-slate-50 flex items-center justify-between">
                                        <span className="text-[10px] font-black text-slate-300 uppercase italic">Mật khẩu: {user.password}</span>
                                        <Icon name="lock" size={14} className="text-slate-200" />
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Modal Thêm */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <form onSubmit={addUser} className="bg-white rounded-[3rem] w-full max-w-md p-10 shadow-2xl">
                                <h3 className="text-2xl font-black uppercase italic mb-8">Tạo tài khoản mới</h3>
                                <div className="space-y-4">
                                    <input name="name" placeholder="Tên hiển thị (Vd: Nguyễn Văn A)" className="w-full p-4 bg-slate-100 rounded-2xl font-bold border-none outline-none" required />
                                    <input name="username" placeholder="Tên đăng nhập" className="w-full p-4 bg-slate-100 rounded-2xl font-bold border-none outline-none" required />
                                    <input name="password" placeholder="Mật khẩu" className="w-full p-4 bg-slate-100 rounded-2xl font-bold border-none outline-none" required />
                                    <select name="role" className="w-full p-4 bg-slate-100 rounded-2xl font-bold border-none outline-none">
                                        <option value="staff">Nhân viên (Staff)</option>
                                        <option value="admin">Quản trị viên (Admin)</option>
                                    </select>
                                    
                                    <div className="py-4">
                                        <p className="text-[10px] font-black uppercase text-slate-400 mb-3 ml-2">Quyền truy cập</p>
                                        <div className="grid grid-cols-2 gap-3 text-xs font-bold text-slate-600">
                                            {['pos', 'preparing', 'inventory', 'menu', 'history'].map(perm => (
                                                <label key={perm} className="flex items-center gap-2 cursor-pointer bg-slate-50 p-3 rounded-xl">
                                                    <input type="checkbox" name="perms" value={perm} defaultChecked className="w-4 h-4 accent-emerald-500" />
                                                    <span className="capitalize">{perm}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <button type="submit" className="w-full mt-6 py-5 bg-slate-900 text-white rounded-3xl font-black uppercase shadow-xl hover:bg-emerald-600 transition-all">Tạo nhân viên</button>
                                <button type="button" onClick={() => setShowAddModal(false)} className="w-full mt-4 text-slate-400 font-bold text-xs uppercase">Hủy bỏ</button>
                            </form>
                        </div>
                    )}

                    {/* Modal Sửa */}
                    {editingUser && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3rem] w-full max-w-md p-10 shadow-2xl">
                                <h3 className="text-2xl font-black uppercase italic mb-8">Sửa tài khoản</h3>
                                <div className="space-y-4">
                                    <input 
                                        value={editingUser.name} 
                                        onChange={e => setEditingUser({...editingUser, name: e.target.value})}
                                        className="w-full p-4 bg-slate-100 rounded-2xl font-bold" 
                                    />
                                    <input 
                                        value={editingUser.password} 
                                        onChange={e => setEditingUser({...editingUser, password: e.target.value})}
                                        className="w-full p-4 bg-slate-100 rounded-2xl font-bold" 
                                    />
                                    <select 
                                        value={editingUser.role} 
                                        onChange={e => setEditingUser({...editingUser, role: e.target.value})}
                                        className="w-full p-4 bg-slate-100 rounded-2xl font-bold"
                                    >
                                        <option value="staff">Staff</option>
                                        <option value="admin">Admin</option>
                                    </select>
                                    
                                    <div className="grid grid-cols-2 gap-2 text-xs font-bold py-4">
                                        {['pos', 'preparing', 'inventory', 'menu', 'history'].map(perm => (
                                            <label key={perm} className="flex items-center gap-2 bg-slate-50 p-3 rounded-xl">
                                                <input 
                                                    type="checkbox" 
                                                    checked={editingUser.permissions?.includes(perm)}
                                                    onChange={e => {
                                                        const newPerms = e.target.checked 
                                                            ? [...(editingUser.permissions || []), perm]
                                                            : (editingUser.permissions || []).filter(p => p !== perm);
                                                        setEditingUser({...editingUser, permissions: newPerms});
                                                    }}
                                                    className="w-5 h-5 accent-emerald-600"
                                                />
                                                <span className="capitalize">{perm === 'pos' ? 'Bán hàng' : perm === 'preparing' ? 'Hàng đợi' : perm === 'inventory' ? 'Kho' : perm === 'menu' ? 'Thực đơn' : 'Báo cáo'}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>

                                <button onClick={saveEditedUser} className="w-full py-5 bg-emerald-600 text-white rounded-3xl font-black">Lưu thay đổi</button>
                                <button onClick={() => setEditingUser(null)} className="w-full mt-3 py-3 text-slate-400">Đóng</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const SidebarItem = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-4 px-4 py-4 rounded-2xl transition-all ${active ? 'bg-emerald-500 text-white shadow-lg' : 'text-slate-500 hover:bg-white/5'}`}>
                <Icon name={icon} />
                <span className="font-black text-[10px] hidden lg:block uppercase tracking-widest flex-1 text-left">{label}</span>
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppAdmin />);
    </script>
</body>
</html>
